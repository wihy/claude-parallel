name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unittest:
    name: unittest (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml rich
      - name: Run unittest
        run: python -m unittest discover -s tests -v

  layer-check:
    name: 分层 import 方向守护
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run layer check
        run: bash scripts/check_import_layers.sh

  cli-smoke:
    name: CLI 冒烟 (run/plan/chat --help)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install pyyaml rich
      - name: Check help outputs
        run: |
          python run.py --help | head -5
          python run.py perf --help | head -5
          python chat.py --help | head -5
